name: Build VOXLINE

on:
  push:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package VST3 (ZIP)
        shell: pwsh
        run: Compress-Archive -Path build\VOXLINE_artefacts\Release\VST3\VOXLINE.vst3 -DestinationPath VOXLINE_Windows_VST3.zip

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VOXLINE-Windows-VST3
          path: VOXLINE_Windows_VST3.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package VST3 (ZIP)
        run: |
          cd build/VOXLINE_artefacts/Release/VST3
          zip -r ../../../../../VOXLINE_macOS_VST3.zip VOXLINE.vst3
          cd ../../../..
      - name: Package AU (ZIP)
        run: |
          cd build/VOXLINE_artefacts/Release/AU
          zip -r ../../../../../VOXLINE_macOS_AU.zip VOXLINE.component
          cd ../../../..

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VOXLINE-macOS-VST3
          path: VOXLINE_macOS_VST3.zip

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: VOXLINE-macOS-AU
          path: VOXLINE_macOS_AU.zip
