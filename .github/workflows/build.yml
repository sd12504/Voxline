name: Build VOXLINE

on:
  push:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package VST3 (ZIP)
        shell: pwsh
        run: Compress-Archive -Path build\VOXLINE_artefacts\Release\VST3\VOXLINE.vst3 -DestinationPath VOXLINE_Windows_VST3.zip

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VOXLINE-Windows-VST3
          path: VOXLINE_Windows_VST3.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Build PKG
        run: |
          mkdir -p pkg_root/VST3 pkg_root/Components
          cp -R build/VOXLINE_artefacts/Release/VST3/VOXLINE.vst3 pkg_root/VST3/
          cp -R build/VOXLINE_artefacts/Release/AU/VOXLINE.component pkg_root/Components/
          pkgbuild --root pkg_root --install-location "/Library/Audio/Plug-Ins" \
            --identifier com.onetake.voxline --version 1.0.0 VOXLINE.pkg

      - name: Package DMG
        run: |
          mkdir -p dmg_root
          cp VOXLINE.pkg dmg_root/
          hdiutil create -volname "VOXLINE" -srcfolder dmg_root -ov -format UDZO VOXLINE_macOS.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: VOXLINE-macOS-DMG
          path: VOXLINE_macOS.dmg
